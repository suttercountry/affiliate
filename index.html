<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AffiliateGen Pro - Konten Viral 10 Detik</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .canvas-container { 
            aspect-ratio: 9/16; 
            max-height: 75vh; 
            margin: auto; 
            position: relative; 
            overflow: hidden; 
            border-radius: 1.5rem; 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            background: #111;
        }
        canvas { width: 100%; height: 100%; object-fit: contain; }
        .tab-active { border-bottom: 3px solid #f97316; color: #f97316; }
        .gradient-shopee { background: linear-gradient(135deg, #ee4d2d 0%, #ff7337 100%); }
        .loading-bar { transition: width 0.1s linear; }
        input[type="range"] { accent-color: #f97316; }
        
        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 99px;
            font-size: 0.875rem;
            z-index: 100;
            display: none;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 pb-20">

    <div id="toast" class="toast"></div>

    <nav class="bg-white border-b border-slate-200 sticky top-0 z-50 px-4 py-3">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="w-10 h-10 gradient-shopee rounded-xl flex items-center justify-center text-white font-bold">A</div>
                <h1 class="text-xl font-extrabold tracking-tight">AffiliateGen <span class="text-orange-500">Pro</span></h1>
            </div>
            <div id="aiStatus" class="text-sm font-medium text-slate-500 flex items-center gap-1">
                <span class="w-2 h-2 bg-green-500 rounded-full"></span> AI Ready
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto p-4 md:p-8 grid grid-cols-1 lg:grid-cols-12 gap-8">
        
        <!-- Preview Section -->
        <section class="lg:col-span-5 flex flex-col gap-4">
            <div class="canvas-container border-[6px] border-white relative">
                <canvas id="mainCanvas" width="1080" height="1920"></canvas>
                
                <div id="recordingOverlay" class="absolute inset-0 bg-black/80 flex flex-col items-center justify-center hidden z-40 backdrop-blur-sm">
                    <div class="text-orange-500 font-black text-4xl mb-2" id="timerLabel">00:00</div>
                    <p class="text-white font-medium mb-6">Mengekspor Video HD...</p>
                    <div class="w-2/3 bg-white/10 h-3 rounded-full overflow-hidden border border-white/20">
                        <div id="progressBar" class="loading-bar h-full bg-orange-500 w-0"></div>
                    </div>
                </div>
            </div>
            <div class="flex justify-between items-center px-2">
                <p class="text-xs text-slate-400 font-bold uppercase tracking-widest">9:16 Vertical HD</p>
                <button onclick="toggleSafeZone()" class="text-xs font-bold text-orange-600 hover:bg-orange-50 px-3 py-1 rounded-full transition-colors">Toggle Safe Zone</button>
            </div>
        </section>

        <!-- Control Section -->
        <section class="lg:col-span-7 space-y-6">
            
            <div class="flex border-b border-slate-200 gap-6 mb-4 overflow-x-auto">
                <button onclick="switchTab('media')" id="tab-media" class="tab-active pb-3 text-sm font-bold whitespace-nowrap transition-all">1. MEDIA</button>
                <button onclick="switchTab('detail')" id="tab-detail" class="pb-3 text-sm font-bold text-slate-400 whitespace-nowrap transition-all">2. DETAIL</button>
                <button onclick="switchTab('style')" id="tab-style" class="pb-3 text-sm font-bold text-slate-400 whitespace-nowrap transition-all">3. STYLE</button>
            </div>

            <!-- Media Content -->
            <div id="content-media" class="space-y-6">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                    <div class="grid grid-cols-2 gap-4">
                        <button id="btnCamera" class="flex flex-col items-center gap-3 p-6 bg-slate-50 hover:bg-orange-50 border-2 border-dashed border-slate-200 rounded-2xl transition-all">
                            <div class="w-12 h-12 bg-white rounded-full flex items-center justify-center shadow-sm text-orange-500">
                                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" stroke-width="2"></path></svg>
                            </div>
                            <span class="font-bold text-sm">Ambil Video</span>
                        </button>
                        <button id="btnUpload" class="flex flex-col items-center gap-3 p-6 bg-slate-50 hover:bg-blue-50 border-2 border-dashed border-slate-200 rounded-2xl transition-all">
                            <div class="w-12 h-12 bg-white rounded-full flex items-center justify-center shadow-sm text-blue-500">
                                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" stroke-width="2"></path></svg>
                            </div>
                            <span class="font-bold text-sm">Upload File</span>
                        </button>
                    </div>
                    <input type="file" id="fileInput" accept="image/*,video/*" class="hidden">
                </div>
            </div>

            <!-- Detail Content -->
            <div id="content-detail" class="hidden space-y-4">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 space-y-4">
                    <div class="flex items-center justify-between">
                        <label class="block text-sm font-bold text-slate-700">Informasi Produk</label>
                        <button id="btnAiSuggest" class="text-xs font-black text-white bg-indigo-600 px-3 py-1.5 rounded-lg flex items-center gap-1 hover:bg-indigo-700 active:scale-95 transition-all">
                            AI MAGIC ✨
                        </button>
                    </div>
                    
                    <input type="text" id="inpTitle" placeholder="Nama Produk..." class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl outline-none font-bold">
                    <div class="grid grid-cols-2 gap-4">
                        <input type="text" id="inpOldPrice" placeholder="Harga Coret" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl outline-none text-slate-400 line-through">
                        <input type="text" id="inpPrice" placeholder="Harga Promo" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl outline-none font-bold text-orange-600">
                    </div>
                    <input type="text" id="inpCTA" placeholder="Teks Tombol (CTA)" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl outline-none font-bold text-slate-700" value="CEK KERANJANG KUNING!">
                </div>
            </div>

            <!-- Style Content -->
            <div id="content-style" class="hidden space-y-6">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 space-y-6">
                    <div class="grid grid-cols-3 gap-3">
                        <button onclick="setTheme('shopee')" class="p-4 rounded-xl border-2 border-orange-500 bg-orange-50 text-orange-600 font-bold text-xs">SHOPEE</button>
                        <button onclick="setTheme('tiktok')" class="p-4 rounded-xl border-2 border-slate-200 bg-slate-900 text-white font-bold text-xs">TIKTOK</button>
                        <button onclick="setTheme('minimal')" class="p-4 rounded-xl border-2 border-slate-200 bg-white text-slate-800 font-bold text-xs">CLEAN</button>
                    </div>
                    <div class="flex flex-wrap gap-3">
                        <label class="flex items-center gap-2 px-4 py-2 bg-slate-100 rounded-full cursor-pointer">
                            <input type="checkbox" id="stickerFree" checked> <span class="text-xs font-bold">FREE ONGKIR</span>
                        </label>
                        <label class="flex items-center gap-2 px-4 py-2 bg-slate-100 rounded-full cursor-pointer">
                            <input type="checkbox" id="stickerCOD"> <span class="text-xs font-bold">BISA COD</span>
                        </label>
                    </div>
                </div>
            </div>

            <button id="btnGenerate" class="w-full py-5 gradient-shopee text-white font-black rounded-2xl shadow-xl hover:scale-[1.01] active:scale-95 transition-all text-xl">
                EXPORT VIDEO (10 DETIK)
            </button>
            
            <div id="downloadArea" class="hidden">
                <a id="downloadLink" href="#" class="w-full py-4 bg-green-600 text-white font-bold rounded-2xl text-center block">SIMPAN KE GALERI</a>
            </div>
        </section>
    </main>

    <video id="vSrc" class="hidden" autoplay muted playsinline loop crossorigin="anonymous"></video>
    <img id="iSrc" class="hidden" src="" crossorigin="anonymous">

    <script>
        const apiKey = ""; // Dibiarkan kosong agar sistem mengotomatisasi
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');
        const vSrc = document.getElementById('vSrc');
        const iSrc = document.getElementById('iSrc');
        const fileInput = document.getElementById('fileInput');
        
        let mediaType = 'none';
        let currentTheme = 'shopee';
        let isRecording = false;
        let pulseVal = 0;
        let pulseDir = 0.04;

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3000);
        }

        // Logic Tab
        function switchTab(id) {
            ['media', 'detail', 'style'].forEach(t => {
                document.getElementById(`content-${t}`).classList.add('hidden');
                document.getElementById(`tab-${t}`).classList.remove('tab-active', 'text-slate-900');
            });
            document.getElementById(`content-${id}`).classList.remove('hidden');
            document.getElementById(`tab-${id}`).classList.add('tab-active', 'text-slate-900');
        }

        function setTheme(theme) { currentTheme = theme; }

        // AI Logic with Exponential Backoff
        async function fetchGeminiWithRetry(prompt, retries = 5, delay = 1000) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            
            for (let i = 0; i < retries; i++) {
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }] }],
                            generationConfig: { responseMimeType: "application/json" }
                        })
                    });
                    
                    if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                    
                    const data = await response.json();
                    if (data.candidates && data.candidates[0]) {
                        return JSON.parse(data.candidates[0].content.parts[0].text);
                    }
                    throw new Error("Invalid AI Response structure");
                } catch (err) {
                    if (i === retries - 1) throw err;
                    await new Promise(r => setTimeout(r, delay));
                    delay *= 2; // Exponential backoff
                }
            }
        }

        document.getElementById('btnAiSuggest').onclick = async () => {
            const btn = document.getElementById('btnAiSuggest');
            btn.innerText = "THINKING...";
            btn.disabled = true;

            try {
                const res = await fetchGeminiWithRetry("Buatkan info produk viral TikTok. Nama Produk (singkat), Harga Coret, Harga Promo (diskon 70%), CTA lucu. Format JSON: {title, oldPrice, price, cta}");
                
                document.getElementById('inpTitle').value = res.title || "";
                document.getElementById('inpOldPrice').value = res.oldPrice || "";
                document.getElementById('inpPrice').value = res.price || "";
                document.getElementById('inpCTA').value = res.cta || "CEK SEKARANG!";
                showToast("AI berhasil membuat detail produk!");
            } catch (err) {
                console.error(err);
                showToast("AI sibuk. Coba isi manual atau klik lagi.");
            } finally {
                btn.innerText = "AI MAGIC ✨";
                btn.disabled = false;
            }
        };

        // Media Logic
        document.getElementById('btnCamera').onclick = async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment', width: 1080, height: 1920 } 
                });
                vSrc.srcObject = stream;
                vSrc.onloadedmetadata = () => {
                    vSrc.play();
                    mediaType = 'video';
                    showToast("Kamera Aktif");
                };
            } catch (err) {
                showToast("Kamera tidak ditemukan / Izin ditolak");
            }
        };

        document.getElementById('btnUpload').onclick = () => fileInput.click();
        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const url = URL.createObjectURL(file);
            if (file.type.startsWith('image/')) {
                mediaType = 'image';
                iSrc.src = url;
            } else {
                mediaType = 'video';
                vSrc.srcObject = null;
                vSrc.src = url;
                vSrc.oncanplay = () => vSrc.play();
            }
        };

        // Rendering Loop
        function draw() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            let source = (mediaType === 'image') ? iSrc : vSrc;
            if (mediaType !== 'none' && (source.complete || source.readyState >= 2)) {
                const sW = (mediaType === 'image') ? source.width : source.videoWidth;
                const sH = (mediaType === 'image') ? source.height : source.videoHeight;
                const ratio = Math.max(canvas.width / sW, canvas.height / sH);
                const nw = sW * ratio;
                const nh = sH * ratio;
                ctx.drawImage(source, (canvas.width - nw) / 2, (canvas.height - nh) / 2, nw, nh);
            }

            // UI Elements
            pulseVal += pulseDir;
            if (pulseVal > 1 || pulseVal < 0) pulseDir *= -1;

            const theme = currentTheme === 'shopee' ? { bg: '#ee4d2d', accent: '#ffcc00' } : 
                          currentTheme === 'tiktok' ? { bg: '#fe2c55', accent: '#fff' } : { bg: '#222', accent: '#fff' };

            // Overlay
            const g = ctx.createLinearGradient(0, canvas.height * 0.7, 0, canvas.height);
            g.addColorStop(0, 'transparent');
            g.addColorStop(1, 'rgba(0,0,0,0.8)');
            ctx.fillStyle = g;
            ctx.fillRect(0, canvas.height * 0.7, canvas.width, canvas.height * 0.3);

            // Teks
            ctx.fillStyle = "#fff";
            ctx.font = "bold 60px 'Plus Jakarta Sans'";
            ctx.fillText((document.getElementById('inpTitle').value || "PROMO HARI INI").toUpperCase(), 60, canvas.height - 350);

            ctx.fillStyle = theme.accent;
            ctx.font = "bold 90px 'Plus Jakarta Sans'";
            ctx.fillText(document.getElementById('inpPrice').value || "Rp ???", 60, canvas.height - 230);

            // CTA Button
            ctx.save();
            ctx.translate(canvas.width/2, canvas.height - 100);
            ctx.scale(1 + pulseVal * 0.03, 1 + pulseVal * 0.03);
            ctx.fillStyle = theme.bg;
            ctx.beginPath();
            ctx.roundRect(-450, -60, 900, 120, 60);
            ctx.fill();
            ctx.fillStyle = "#fff";
            ctx.font = "bold 45px 'Plus Jakarta Sans'";
            ctx.textAlign = "center";
            ctx.fillText(document.getElementById('inpCTA').value, 0, 15);
            ctx.restore();

            if (!isRecording) requestAnimationFrame(draw);
        }

        // Export
        async function startExport() {
            if (mediaType === 'none') return showToast("Upload media dulu!");
            isRecording = true;
            const chunks = [];
            const stream = canvas.captureStream(30);
            const recorder = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp9' });

            document.getElementById('recordingOverlay').classList.remove('hidden');
            recorder.ondataavailable = e => chunks.push(e.data);
            recorder.onstop = () => {
                const blob = new Blob(chunks, { type: 'video/webm' });
                document.getElementById('downloadLink').href = URL.createObjectURL(blob);
                document.getElementById('downloadLink').download = `Affiliate_${Date.now()}.webm`;
                document.getElementById('downloadArea').classList.remove('hidden');
                document.getElementById('recordingOverlay').classList.add('hidden');
                isRecording = false;
                draw();
            };

            recorder.start();
            setTimeout(() => recorder.stop(), 10000);
            
            let start = Date.now();
            const p = () => {
                let n = Date.now() - start;
                document.getElementById('progressBar').style.width = `${(n/10000)*100}%`;
                document.getElementById('timerLabel').innerText = `00:0${Math.floor(n/1000)}`;
                draw();
                if (n < 10000) requestAnimationFrame(p);
            };
            p();
        }

        document.getElementById('btnGenerate').onclick = startExport;
        window.onload = draw;
    </script>
</body>
</html>
